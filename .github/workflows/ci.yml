name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Path-split gate (#202). Docs/skills-only PRs skip the heavy 3-arch matrix and
  # coverage while still publishing every required status context, so they merge
  # in seconds without deadlocking branch protection. A single gate is the source
  # of truth for the split — no twin `ci-skip.yml` whose stub job names must be
  # hand-mirrored against this matrix (which would silently rot when the matrix or
  # protection set changes). Non-PR events (main pushes) always take the full
  # path. No markdown is `include_str!`-compiled here, but the doc set still
  # scopes `*.md` to the repo root only — never `**/*.md` — so anything not
  # explicitly a doc runs full CI (fail-safe).
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.decide.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            code:
              - '**'
              - '!*.md'
              - '!docs/**'
              - '!.claude/skills/**'

      - id: decide
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=${{ steps.filter.outputs.code }}" >> "$GITHUB_OUTPUT"
          fi

  # Required-context jobs (Test x86/ARM/macOS, Clippy, Format, Documentation)
  # always run so their contexts always report `success`; on the fast path every
  # step is skipped, which is a genuine passing job — not a `skipped` conclusion
  # whose branch-protection semantics vary. Non-required jobs (bench, coverage)
  # below skip wholesale via a job-level `if`.
  test-x86:
    name: Test (x86_64)
    needs: gate
    runs-on: ubuntu-latest
    env:
      # x86 SIMD CI leg (#193): the SIMD suites self-skip (with a visible
      # `SKIPPED` line) when a CPU feature is missing, so this pins the runner
      # contract — tests/simd_expectation_tests.rs fails the leg if any listed
      # feature stops being detected, instead of the suites silently skipping.
      # The SSE2 kernels don't need an AVX2-disabled config: the differential
      # tests (tests/simd_level_tests.rs, tests/dsv_simd_differential_tests.rs,
      # src/yaml/simd/x86.rs) call each kernel directly, so every level is
      # exercised on this AVX2 runner. There is deliberately no x86 dispatch
      # override (docs/reference/environment-variables.md).
      SUCCINCTLY_EXPECT_SIMD: sse2,sse4.2,avx2,bmi2,popcnt
    steps:
      - uses: actions/checkout@v4
        if: needs.gate.outputs.code == 'true'

      - name: Check CPU features (x86 SIMD)
        if: needs.gate.outputs.code == 'true'
        run: |
          echo "=== CPU Info ==="
          lscpu | grep -E "Model name|Architecture|CPU" || true
          echo "=== x86 SIMD Detection (expecting $SUCCINCTLY_EXPECT_SIMD) ==="
          for feature in sse2 sse4_2 avx2 bmi2 popcnt; do
            if grep -qw "$feature" /proc/cpuinfo; then echo "$feature: supported"; else echo "$feature: not detected"; fi
          done

      - name: Install Rust
        if: needs.gate.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: needs.gate.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # The x86 SIMD tests (BMI2, AVX2) self-skip when the feature is absent,
      # which reads as a silent pass. Fail loudly if this runner can't actually
      # exercise them, so an all-skipped SIMD suite never looks green (#192).
      # NOTE: AVX-512 is intentionally NOT required — the standard x86 runners
      # (Zen 3 EPYC) lack it, so those paths are validated off routine CI. See
      # CONTRIBUTING.md ("SIMD CI coverage").
      - name: Verify SIMD CPU features (BMI2 + AVX2)
        if: needs.gate.outputs.code == 'true'
        run: |
          echo "=== CPU Info ==="
          lscpu | grep -E "Model name|Architecture|Flags" || true
          missing=""
          grep -qw avx2 /proc/cpuinfo || missing="$missing avx2"
          grep -qw bmi2 /proc/cpuinfo || missing="$missing bmi2"
          if [ -n "$missing" ]; then
            echo "::error::x86 runner is missing CPU feature(s):$missing — the BMI2/AVX2 SIMD tests would self-skip. See CONTRIBUTING.md (SIMD CI coverage)."
            exit 1
          fi
          echo "BMI2 + AVX2 present: SIMD tests will assert, not skip."

      - name: Build
        if: needs.gate.outputs.code == 'true'
        run: cargo build --verbose

      - name: Build CLI (for integration tests)
        if: needs.gate.outputs.code == 'true'
        run: cargo build --features cli --bin succinctly

      - name: Run cli-gated yq tests
        if: needs.gate.outputs.code == 'true'
        run: cargo test --features cli --test yq_cli_tests --test yq_golden_tests

      - name: Run tests
        if: needs.gate.outputs.code == 'true'
        run: cargo test --verbose

      - name: Run tests (simd feature)
        if: needs.gate.outputs.code == 'true'
        run: cargo test --verbose --features simd

      - name: Run tests (portable-popcount feature)
        if: needs.gate.outputs.code == 'true'
        run: cargo test --verbose --features portable-popcount

      - name: Check no_std compatibility
        if: needs.gate.outputs.code == 'true'
        run: cargo check --no-default-features

  test-arm:
    name: Test (ARM64)
    needs: gate
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        if: needs.gate.outputs.code == 'true'

      - name: Install Rust
        if: needs.gate.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: needs.gate.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}

      # The aarch64 SVE2 tests self-skip (emitting a `SKIPPED: SIMD test` marker
      # via note_simd_skip) when sve2-bitperm is absent. The ubuntu-24.04-arm
      # runner (Neoverse-N2) provides it, so require it here: an all-skipped SVE2
      # suite must never read as green (#192). NEON is always present on aarch64.
      - name: Verify SIMD CPU features (NEON + SVE2-BITPERM)
        if: needs.gate.outputs.code == 'true'
        run: |
          echo "=== CPU Info ==="
          lscpu | grep -E "Model name|Architecture|CPU|Flags" || true
          if ! grep -qw svebitperm /proc/cpuinfo; then
            echo "::error::ARM runner lacks SVE2-BITPERM — the SVE2 BDEP/BEXT tests would self-skip. See CONTRIBUTING.md (SIMD CI coverage)."
            exit 1
          fi
          echo "NEON (always on aarch64) + SVE2-BITPERM present: SIMD tests will assert, not skip."

      - name: Build
        if: needs.gate.outputs.code == 'true'
        run: cargo build --verbose

      - name: Build CLI (for integration tests)
        if: needs.gate.outputs.code == 'true'
        run: cargo build --features cli --bin succinctly

      - name: Run cli-gated yq tests
        if: needs.gate.outputs.code == 'true'
        run: cargo test --features cli --test yq_cli_tests --test yq_golden_tests

      - name: Run tests
        if: needs.gate.outputs.code == 'true'
        run: cargo test --verbose

      - name: Run tests (simd feature)
        if: needs.gate.outputs.code == 'true'
        run: cargo test --verbose --features simd

      - name: Run tests (portable-popcount feature)
        if: needs.gate.outputs.code == 'true'
        run: cargo test --verbose --features portable-popcount

  test-macos-arm:
    name: Test (macOS ARM64)
    needs: gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.gate.outputs.code == 'true'

      - name: Install Rust
        if: needs.gate.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: needs.gate.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        if: needs.gate.outputs.code == 'true'
        run: cargo build --verbose

      - name: Build CLI (for integration tests)
        if: needs.gate.outputs.code == 'true'
        run: cargo build --features cli --bin succinctly

      - name: Run cli-gated yq tests
        if: needs.gate.outputs.code == 'true'
        run: cargo test --features cli --test yq_cli_tests --test yq_golden_tests

      - name: Run tests
        if: needs.gate.outputs.code == 'true'
        run: cargo test --verbose

      - name: Run tests (simd feature)
        if: needs.gate.outputs.code == 'true'
        run: cargo test --verbose --features simd

      - name: Run tests (portable-popcount feature)
        if: needs.gate.outputs.code == 'true'
        run: cargo test --verbose --features portable-popcount

  # Upstream-toolchain leg (#203). Runs the x86_64 test suite on beta and nightly
  # to catch upcoming-compiler breakage (lint changes, soundness fixes, stdlib
  # deprecations) before it reaches a release. x86_64 only — the 3-arch fan-out
  # above stays on `stable` so we don't triple CI minutes. `beta` gates CI;
  # `nightly` is advisory (`continue-on-error`) because it is the flakiest. Not a
  # required status context, so it skips wholesale on the docs-only fast path
  # (job-level `if`, like bench/coverage) rather than run-and-skip-steps.
  test-x86-upstream:
    name: Test (x86_64) (${{ matrix.rust }})
    needs: gate
    if: needs.gate.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false                                   # beta breakage must not cancel nightly
      matrix:
        rust: [beta, nightly]
    continue-on-error: ${{ matrix.rust == 'nightly' }}   # beta gates CI; nightly is advisory
    env:
      # Same x86 SIMD runner contract as test-x86 (#193).
      SUCCINCTLY_EXPECT_SIMD: sse2,sse4.2,avx2,bmi2,popcnt
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Build CLI (for integration tests)
        run: cargo build --features cli --bin succinctly

      - name: Run cli-gated yq tests
        run: cargo test --features cli --test yq_cli_tests --test yq_golden_tests

      - name: Run tests
        run: cargo test --verbose

      - name: Run tests (simd feature)
        run: cargo test --verbose --features simd

      - name: Run tests (portable-popcount feature)
        run: cargo test --verbose --features portable-popcount

      - name: Check no_std compatibility
        run: cargo check --no-default-features

  bench:
    name: Bench (${{ matrix.name }})
    needs: gate
    if: needs.gate.outputs.code == 'true'
    strategy:
      matrix:
        include:
          - name: x86_64
            runner: ubuntu-latest
            arch: x86_64
          - name: ARM64-Linux
            runner: ubuntu-24.04-arm
            arch: arm64
          - name: ARM64-macOS
            runner: macos-latest
            arch: arm64-macos
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.arch }}-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Print CPU info
        run: |
          echo "=== CPU Info ==="
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            lscpu | grep -E "Model name|Architecture|CPU\(s\)|Flags" || true
            # Check for specific features
            echo "=== Feature Detection ==="
            if grep -q avx2 /proc/cpuinfo 2>/dev/null; then echo "AVX2: supported"; else echo "AVX2: not detected"; fi
            if grep -q popcnt /proc/cpuinfo 2>/dev/null; then echo "POPCNT: supported"; else echo "POPCNT: not detected"; fi
            if grep -q sve2 /proc/cpuinfo 2>/dev/null; then echo "SVE2: supported"; else echo "SVE2: not detected"; fi
            if grep -q svebitperm /proc/cpuinfo 2>/dev/null; then echo "SVE2-BITPERM: supported"; else echo "SVE2-BITPERM: not detected"; fi
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            sysctl -n machdep.cpu.brand_string || true
            system_profiler SPHardwareDataType | grep -E "Chip|Cores" || true
            echo "Note: Apple Silicon does not support SVE/SVE2"
          fi

      - name: Run benchmarks (default)
        run: cargo bench --bench rank_select -- --noplot | tee bench-default.txt

      - name: Run benchmarks (simd)
        run: cargo bench --bench rank_select --features simd -- --noplot | tee bench-simd.txt

      - name: Run benchmarks (portable)
        run: cargo bench --bench rank_select --features portable-popcount -- --noplot | tee bench-portable.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.arch }}
          path: bench-*.txt

  clippy:
    name: Clippy
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.gate.outputs.code == 'true'

      - name: Install Rust
        if: needs.gate.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run Clippy
        if: needs.gate.outputs.code == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings

  fmt:
    name: Format
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.gate.outputs.code == 'true'

      - name: Install Rust
        if: needs.gate.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        if: needs.gate.outputs.code == 'true'
        run: cargo fmt --all -- --check

  skill-casing:
    name: Skill manifest casing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md casing (#189)
        run: |
          bad="$(find .claude/skills -maxdepth 2 -iname 'skill.md' ! -name 'SKILL.md')"
          if [ -n "$bad" ]; then
            echo "::error::Skill manifests must be named SKILL.md (see #189):"
            echo "$bad"
            exit 1
          fi

  docs:
    name: Documentation
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: needs.gate.outputs.code == 'true'

      - name: Install Rust
        if: needs.gate.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build docs
        if: needs.gate.outputs.code == 'true'
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  coverage:
    name: Coverage (${{ matrix.name }})
    needs: gate
    if: needs.gate.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            runner: ubuntu-latest
            use-prebuilt: 'true'
          - name: ARM64
            runner: ubuntu-24.04-arm
            use-prebuilt: 'false'   # no aarch64-linux prebuilt; build omni-dev from source
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      pull-requests: write          # required to post the sticky coverage comment
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history for git merge-base (PR fork point)

      - uses: action-works/omni-dev-coverage-check@v1
        with:
          version: 0.34.0                               # pin; we're a consumer
          use-prebuilt-binary: ${{ matrix.use-prebuilt }}
          test-args: --features cli,simd,regex,serde --workspace
          fail-under-lines: 55   # floor a few pts below local llvm-cov (ARM: 59.58% lines)
          # fail-under-patch left unset → report-only initially
          baseline-artifact-name: coverage-baseline-${{ matrix.name }}
          artifact-name: coverage-summary-${{ matrix.name }}
          comment-header: coverage-${{ matrix.name }}

  # Drift detector for the yq golden fixtures (tests/data/yq-golden/): the
  # goldens are frozen oracle output, so this is the one job that re-checks
  # them against the pinned mikefarah/yq. Unlike the pre-#227 comparison
  # tests, a missing or wrong-version yq fails here — it cannot skip.
  yq-drift:
    name: yq golden drift check
    needs: gate
    if: needs.gate.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned yq
        run: |
          V="$(cat tests/data/yq-golden/YQ_VERSION)"
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/${V}/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version | grep -F "version ${V}"

      - name: Verify goldens against pinned yq
        run: ./scripts/sync-yq-golden.sh --check
