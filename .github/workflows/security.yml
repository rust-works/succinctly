name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Prebuilt binary via taiki-e/install-action (cacheable), rather than
      # `cargo install cargo-audit`, which recompiles from source every run.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo-audit
        run: cargo audit

  deny:
    name: Dependency Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: EmbarkStudios/cargo-deny-action@v2.1.1
        with:
          command: check all

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: TruffleHog (verified secrets)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
